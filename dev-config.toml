# Local development server configuration.
#
# This file is intentionally minimal and uses only fields from
# the `aion-server` library's ServerConfig. Add built `.aion` archives to
# `workflow_packages` when you want the server to preload them at startup.
# For example, after building the hello-world package:
#   workflow_packages = ["examples/hello-world/hello-world.aion"]
#
# You can also load a package without editing this file. `--config` is optional
# for local development; no-config mode uses the durable ablative defaults
# (haematite event store under ./aion-data), but
# `websocket.event_broadcast_capacity` and `runtime.query_timeout_ms` have no
# defaults and must then come from the environment:
#   AION_WEBSOCKET_EVENT_BROADCAST_CAPACITY=1024 \
#   AION_RUNTIME_QUERY_TIMEOUT_MS=10000 \
#   cargo run -p aion-cli -- server \
#     --workflow-package examples/hello-world/hello-world.aion

workflow_packages = []

[server]
listen_address = "127.0.0.1:8080"
grpc_address = "127.0.0.1:50051"

[store]
# Durable ablative event store (the default). Use backend = "memory" for an
# ephemeral local run that loses all state on stop, or backend = "libsql" with
# url = "aion.db" for the lightweight embedded backend (libsql-backend feature).
backend = "haematite"
data_dir = "aion-data"

[runtime]
# REQUIRED, no default: engine reply deadline for /workflows/query, in
# milliseconds. 10000 is a sample value for local development; size it for
# your deployment's slowest acceptable query round trip.
query_timeout_ms = 10000

[namespaces]
default = "default"

[websocket]
# REQUIRED, no default: capacity of the engine-global live-event broadcast
# channel behind /events/stream. Lag is filter-blind, so size for the global
# event volume across all namespaces, not per-subscription volume.
event_broadcast_capacity = 1024

# Operator deploy API (runtime package load/route/unload). Dark by default:
# with this section absent or enabled = false, /deploy/* is not mounted and
# the gRPC DeployService answers Unimplemented. When enabled,
# max_archive_bytes is REQUIRED (no default) — size it for your packages
# (example archives run 360-422 KB; 16 MiB shown here). max_inflated_bytes is
# also REQUIRED: the ceiling on the total decompressed size of an upload's
# contents (a DEFLATE bomb under max_archive_bytes can inflate ~1000:1); it
# must be at least max_archive_bytes — 64 MiB shown here. Authorization is
# the deployment-wide deploy grant: the `deploy` JWT claim, or in development
# the x-aion-deploy: true header (the aion CLI sends it automatically).
#[deploy]
#enabled = true
#max_archive_bytes = 16777216
#max_inflated_bytes = 67108864
