name: ci

# THE full-gate keystone CI. Mirrors the LOCAL bar exactly so regressions like
# the #157 kill-9 failover quorum bug cannot rot in unnoticed (the repo
# previously had only ops-console-embed.yml — no fmt/clippy/test gate).
#
# Toolchain is pinned by rust-toolchain.toml (stable + rustfmt + clippy,
# edition 2024, rust-version 1.85; no nightly). The clippy bar matches the
# local one: clippy::all + pedantic = deny and unwrap_used/expect_used/panic =
# deny, configured in the workspace lints — so a plain `-D warnings` enforces it.
#
# Two lanes:
#   FAST   — fmt / clippy / test on every push-to-main and PR.
#   SLOW   — the two real OS-process kill-9 failover gates. These spin up 3-node
#            clusters and hard-kill a node, so they run nightly + on demand, and
#            on PRs that touch the failover-critical code (paths filter below).

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly at 04:17 UTC — runs the slow kill-9 failover gates.
    - cron: '17 4 * * *'
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether a PR touches the failover-critical code. Used to decide
  # whether the slow kill-9 lane should run on that PR (it always runs on
  # schedule / workflow_dispatch / push-to-main). Cheap; no toolchain needed.
  changes:
    name: detect failover-critical changes
    runs-on: ubuntu-latest
    outputs:
      failover: ${{ steps.filter.outputs.failover }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            failover:
              - 'crates/aion/**'
              - 'crates/aion-server/**'
              - 'crates/aion-store/**'
              - 'crates/aion-store-haematite/**'
              - 'crates/aion-worker/**'
              - 'crates/aion-cli/tests/**'

  # ----------------------------------------------------------------------- #
  # FAST LANE — runs on every push-to-main and every PR.
  # ----------------------------------------------------------------------- #

  fmt:
    name: fmt (cargo fmt --all --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  clippy:
    name: clippy (-D warnings, default + all-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo clippy --workspace --all-targets --all-features -- -D warnings
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  no-norn-in-platform:
    name: no-norn-in-platform (§3A.4 invariant gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Asserts the platform crates carry ZERO Norn coupling: no cargo-tree
      # dependency edge to aion-integration-norn/norn*, and no norn-crate
      # identifier in platform src (allowlisting the doc-comments + test
      # fixtures). Fails the instant a norn edge is added to a platform crate.
      - name: cargo xtask no-norn-in-platform
        run: cargo xtask no-norn-in-platform

  no-bypasses-aion-awl:
    name: aion-awl zero-bypass guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Keep the crate free of lint/test bypasses and textual source splices.
      # The directory assertion prevents a missing path from becoming a false green.
      - name: reject bypasses in crates/aion-awl
        run: |
          test -d crates/aion-awl
          ! grep -rnE '#!?\[(allow|expect)|#\[ignore|include!\(' crates/aion-awl/

  # Every nested standalone crate (own Cargo.lock, NOT a workspace member) gets
  # the same build/clippy/test bar as the workspace, run in its own directory.
  # These crates rot silently otherwise: no workspace gate compiles them, so an
  # aion-worker API change (or a crate rename) breaks them without any lane
  # going red — exactly what happened to norn-fan-worker (#181) and the
  # stacked-dev workers' test suites.
  standalone-crates:
    name: standalone crates (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - examples/norn-fan-worker
          - examples/stacked-dev/mixed-worker
          - examples/stacked-dev/norn-worker
          - examples/stacked-dev-remote/worker
          - .meridian/workflows/stacked-dev/worker
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.crate }}
      - name: cargo build
        working-directory: ${{ matrix.crate }}
        run: cargo build
      - name: cargo clippy --all-targets -- -D warnings
        working-directory: ${{ matrix.crate }}
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        working-directory: ${{ matrix.crate }}
        run: cargo test

  test:
    name: test (workspace, default + all-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Gleam-dependent tests gate-and-skip when the CLI is unavailable; install
      # Erlang/OTP + gleam so CI executes those tests for full coverage.
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          gleam-version: '1.17.0'
      - name: cargo test --workspace
        run: cargo test --workspace
      - name: cargo test --workspace --all-features
        run: cargo test --workspace --all-features

  awl-check:
    name: aion awl check (checker fixtures)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: aion awl check (checker fixtures)
        run: |
          cargo build -p aion-cli --bin aion -q
          B=target/debug/aion
          s=0
          for f in \
            crates/aion-awl/tests/fixtures/hello.awl \
            crates/aion-awl/tests/fixtures/research_report.awl \
            crates/aion-awl/tests/fixtures/research_report.canonical.awl
          do
            "$B" awl check "$f" || { echo "MUST-PASS FAILED: $f"; s=1; }
          done
          # AWL1-004 adds typed child contracts; when it lands, move both
          # bounded_cycle fixtures into the must-pass set and retire this carve-out.
          for f in \
            crates/aion-awl/tests/fixtures/bounded_cycle.awl \
            crates/aion-awl/tests/fixtures/bounded_cycle.canonical.awl
          do
            test -f "$f" || { echo "EXPECTED-FAIL FIXTURE MISSING: $f"; s=1; continue; }
            if "$B" awl check "$f"; then
              echo "EXPECTED-FAIL NOW GREEN (AWL1-004 landed - retire carve-out): $f"
              s=1
            fi
          done
          exit "$s"

  # Types-first drift gate (ADR-014): the committed examples/order-saga must
  # be byte-current against what `aion generate` derives from its authored
  # types module — codecs module, emitted schemas, wrappers, worker, golden,
  # and the workflow.toml activities list. A hand-edit to any generated
  # artifact (or a type edit committed without regenerating) fails here
  # naming the drifted file. Additive job: composes with the other lanes.
  codegen-drift:
    name: codegen-drift (aion generate --check on examples/order-saga)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `aion generate` drives the real Gleam toolchain (interface export +
      # manifest probe), so the BEAM + gleam must be present.
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          gleam-version: '1.17.0'
      - name: aion generate --check (examples/order-saga)
        run: cargo run -p aion-cli --bin aion -- generate examples/order-saga --check

  # ----------------------------------------------------------------------- #
  # SLOW LANE — the real OS-process failover gates (kill-9 + graceful). These
  # PASS on main since #157 (the per-shard failover seam now forwards through the
  # store decorators) and are MUST-PASS here (no continue-on-error). They run
  # nightly, on demand, and on PRs that touch the failover-critical code. The
  # graceful (non-kill9) osproc test is included here because no other lane runs
  # it (it is `#[ignore]`d, so the fast `cargo test` lanes skip it).
  # ----------------------------------------------------------------------- #

  kill9-failover:
    name: osproc failover gates (slow, post-#157 regression guards)
    runs-on: ubuntu-latest
    needs: changes
    # Always run on schedule / workflow_dispatch / push-to-main; on a PR run only
    # when that PR touches the failover-critical code (see the `changes` job).
    if: >-
      github.event_name != 'pull_request' ||
      needs.changes.outputs.failover == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          gleam-version: '1.17.0'
      - name: lsub5b kill-9 reconnect-to-survivor failover
        run: >-
          cargo test -p aion-cli --features haematite-backend,liminal-transport
          --test lsub5b_osproc_kill9_failover_e2e -- --ignored --nocapture
      - name: parked-timer kill-9 failover
        run: >-
          cargo test -p aion-cli --features haematite-backend,liminal-transport
          --test parked_timer_osproc_kill9_failover_e2e -- --ignored --nocapture
      - name: lsub5b graceful osproc failover (non-kill9 — no fast lane runs it)
        run: >-
          cargo test -p aion-cli --features haematite-backend,liminal-transport
          --test lsub5b_osproc_failover_e2e -- --ignored --nocapture
