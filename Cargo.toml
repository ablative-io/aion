[workspace]
resolver = "2"
members = [
    "crates/aion-core",
    "crates/aion-store",
    "crates/aion-store-libsql",
    "crates/aion-package",
    "crates/aion",
    "crates/aion-nif",
    "crates/aion-proto",
    "crates/aion-server",
    "crates/aion-worker",
    "crates/aion-client"
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"
repository = "https://github.com/ablative/aion"

[workspace.lints.rust]
unsafe_code = "deny"
missing_docs = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
todo = "warn"

[workspace.dependencies]
serde = "1"
serde_json = "1"
thiserror = "2"
anyhow = "1"
uuid = "1"
chrono = "0.4"
async-trait = "0.1"
tokio = "1"
tokio-util = "0.7"
tracing = "0.1"
tracing-subscriber = "0.3"
sha2 = "0.10"
zip = "2"
libsql = "0.6"
tonic = "0.12"
tonic-build = "0.12"
prost = "0.13"
axum = "0.8"
tower = "0.5"
futures = "0.3"
dashmap = "6"
beamr = "0.1"
