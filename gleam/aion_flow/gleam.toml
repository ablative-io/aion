name = "aion_flow"
version = "0.7.0"
target = "erlang"
internal_modules = [
  "aion/internal/activity_dispatch",
  "aion/internal/ffi",
  "aion/internal/pump",
]
description = "Typed durable workflow authoring SDK for Aion."
licences = ["AGPL-3.0-only"]
repository = { type = "github", user = "tomWhiting", repo = "aion" }

[dependencies]
gleam_stdlib = ">= 0.34.0 and < 2.0.0"
gleam_json = ">= 2.0.0 and < 4.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
