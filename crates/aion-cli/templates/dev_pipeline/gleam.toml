name = "{{name}}"
version = "0.1.0"
target = "erlang"
description = "Aion durable dev pipeline scaffolded by `aion new`: provision, concurrent warm-build + dev, a scoped verify-fix loop, an authoritative gate child, a signal-driven review loop, and land."

[dependencies]
aion_flow = ">= 0.5.0 and < 0.6.0"
gleam_stdlib = ">= 0.34.0 and < 2.0.0"
gleam_json = ">= 2.0.0 and < 4.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
