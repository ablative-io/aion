[package]
name = "aion-server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
aion = { path = "../aion" }
aion-proto = { path = "../aion-proto", features = ["generated"] }
aion-store-libsql = { path = "../aion-store-libsql" }
aion-store = { path = "../aion-store" }
tokio = { workspace = true, features = ["full"] }
axum = { workspace = true, features = ["ws"] }
tonic = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
aion-core = { version = "0.1.0", path = "../aion-core" }
dashmap = { workspace = true }
uuid.workspace = true
futures.workspace = true
chrono = { workspace = true, features = ["serde"] }
prost.workspace = true
tokio-stream = "0.1"
tower = { workspace = true, features = ["util"] }
rust-embed = "8.11.0"
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
toml = "1.1.2"
jsonwebtoken = { version = "10.3.0", optional = true }
reqwest = { version = "0.13.4", default-features = false, features = ["json", "rustls"], optional = true }

[dev-dependencies]
tempfile = "3.27.0"

[features]
default = []
auth = ["dep:jsonwebtoken", "dep:reqwest"]
