[package]
name = "aion-server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Deployable HTTP, gRPC, WebSocket, and worker endpoint for Aion workflows."
license.workspace = true
repository.workspace = true
documentation = "https://docs.rs/aion-server"
keywords = ["aion", "workflow", "durable-execution", "server", "grpc"]
categories = ["asynchronous", "development-tools"]

[lints]
workspace = true

[dependencies]
aion = { version = "0.1.0", path = "../aion" }
aion-proto = { version = "0.1.0", path = "../aion-proto", features = ["generated"] }
aion-store-libsql = { version = "0.1.0", path = "../aion-store-libsql" }
aion-store = { version = "0.1.0", path = "../aion-store" }
tokio = { workspace = true, features = ["full"] }
axum = { workspace = true, features = ["ws"] }
tonic = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
aion-core = { version = "0.1.0", path = "../aion-core" }
dashmap = { workspace = true }
uuid.workspace = true
futures.workspace = true
chrono = { workspace = true, features = ["serde"] }
prost.workspace = true
tokio-stream = "0.1"
tower = { workspace = true, features = ["util"] }
rust-embed = "8.11.0"
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
toml = "1.1.2"
prometheus = "0.14.0"
async-trait.workspace = true
base64 = "0.22.1"
jsonwebtoken = { version = "10.3.0", optional = true }
reqwest = { version = "0.13.4", default-features = false, features = ["json", "rustls"], optional = true }
clap = { workspace = true, features = ["derive"] }

[dev-dependencies]
tempfile = "3.27.0"

[features]
default = []
auth = ["dep:jsonwebtoken", "dep:reqwest"]
