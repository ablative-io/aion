syntax = "proto3";

package aion;

import "common.proto";

// Workflow-management API shared by clients and the managed server.
service WorkflowService {
  rpc StartWorkflow(StartWorkflowRequest) returns (StartWorkflowResponse);
  rpc Signal(SignalRequest) returns (SignalResponse);
  rpc Query(QueryRequest) returns (QueryResponse);
  rpc Cancel(CancelRequest) returns (CancelResponse);
  rpc Reopen(ReopenRequest) returns (ReopenResponse);
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);
  rpc CountWorkflows(CountWorkflowsRequest) returns (CountWorkflowsResponse);
  rpc DescribeWorkflow(DescribeWorkflowRequest) returns (DescribeWorkflowResponse);
  rpc CreateSchedule(CreateScheduleRequest) returns (CreateScheduleResponse);
  rpc UpdateSchedule(UpdateScheduleRequest) returns (UpdateScheduleResponse);
  rpc PauseSchedule(ScheduleIdRequest) returns (PauseScheduleResponse);
  rpc ResumeSchedule(ScheduleIdRequest) returns (ResumeScheduleResponse);
  rpc DeleteSchedule(ScheduleIdRequest) returns (DeleteScheduleResponse);
  rpc ListSchedules(ListSchedulesRequest) returns (ListSchedulesResponse);
  rpc DescribeSchedule(ScheduleIdRequest) returns (DescribeScheduleResponse);
}

message StartWorkflowRequest {
  string namespace = 1;
  string workflow_type = 2;
  Payload input = 3;
  // R-4 steered start: caller-chosen routing key. When set, the start is steered
  // to shard_for(routing_key)'s owner (forwarded there if this node is not the
  // owner). Empty/absent keeps the unsteered (R-1 remint) behaviour.
  optional string routing_key = 4;
  // Optional task queue this workflow defaults its activities to (the
  // namespace x task_queue targeting story). When set, it is recorded durably
  // on the start so it survives replay/failover. Empty/absent keeps the
  // namespace's default queue.
  optional string task_queue = 5;
}

message StartWorkflowResponse {
  WorkflowId workflow_id = 1;
  RunId run_id = 2;
}

message SignalRequest {
  string namespace = 1;
  WorkflowId workflow_id = 2;
  RunId run_id = 3;
  string signal_name = 4;
  Payload payload = 5;
}

message SignalResponse {}

message QueryRequest {
  string namespace = 1;
  WorkflowId workflow_id = 2;
  RunId run_id = 3;
  string query_name = 4;
}

message QueryResponse {
  oneof outcome {
    Payload result = 1;
    WireError error = 2;
  }
}

message CancelRequest {
  string namespace = 1;
  WorkflowId workflow_id = 2;
  RunId run_id = 3;
  string reason = 4;
}

message CancelResponse {}

message ReopenRequest {
  string namespace = 1;
  WorkflowId workflow_id = 2;
  // Optional run id; absent means the latest run.
  RunId run_id = 3;
}

// Reopen returns the reopened run id and its projected status (Running) so the
// caller learns the run is live again — distinct from CancelResponse which is
// an empty ack.
message ReopenResponse {
  RunId run_id = 1;
  WorkflowStatus status = 2;
}

message ListWorkflowsRequest {
  string namespace = 1;
  // Serde-encoded aion_store::visibility::ListWorkflowsFilter.
  WireEnvelope filter = 2;
}

message ListWorkflowsResponse {
  // Serde-encoded aion_store::visibility::WorkflowSummary values.
  repeated WireEnvelope summaries = 1;
}

message CountWorkflowsRequest {
  string namespace = 1;
  // Serde-encoded aion_store::visibility::ListWorkflowsFilter.
  WireEnvelope filter = 2;
}

message CountWorkflowsResponse {
  uint64 count = 1;
}

message DescribeWorkflowRequest {
  string namespace = 1;
  WorkflowId workflow_id = 2;
  RunId run_id = 3;
  bool include_history = 4;
}

message DescribeWorkflowResponse {
  WireEnvelope summary = 1;
  repeated WireEnvelope history = 2;
}

message CreateScheduleRequest {
  string namespace = 1;
  WireEnvelope config = 2;
}

message CreateScheduleResponse {
  ScheduleId schedule_id = 1;
  WireEnvelope state = 2;
}

message UpdateScheduleRequest {
  string namespace = 1;
  ScheduleId schedule_id = 2;
  WireEnvelope config = 3;
}

message UpdateScheduleResponse {
  WireEnvelope state = 1;
}

message ScheduleIdRequest {
  string namespace = 1;
  ScheduleId schedule_id = 2;
}

message PauseScheduleResponse {
  WireEnvelope state = 1;
}

message ResumeScheduleResponse {
  WireEnvelope state = 1;
}

message DeleteScheduleResponse {}

message ListSchedulesRequest {
  string namespace = 1;
}

message ListSchedulesResponse {
  repeated WireEnvelope schedules = 1;
}

message DescribeScheduleResponse {
  WireEnvelope state = 1;
}
