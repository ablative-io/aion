syntax = "proto3";

package aion;

import "common.proto";

// WorkerProtocol is one long-lived gRPC bidirectional stream. A worker sends
// RegisterWorker first; the server answers with RegisterAck as the guaranteed
// first frame on the response stream before any other server-to-worker
// message. The worker then sends ActivityResult and Heartbeat messages while
// the server pushes ActivityTask, ResultAck, and DrainRequest messages down
// the same stream; there is no polling RPC.
service WorkerProtocol {
  rpc StreamWorker(stream WorkerToServer) returns (stream ServerToWorker);
}

// Server-initiated drain: this server is going away (restart, deploy,
// rebalance). The worker finishes already-assigned work, reports what it
// can, stops expecting new tasks, and reconnects — to this address after the
// schedule's initial backoff. Receiving DrainRequest re-classifies this
// session's eventual stream end (clean or abrupt) as a DRAIN drop: the
// reconnect consumes NO drop budget. Distinct from denial (gRPC error
// status, terminal) and from an unannounced close (budgeted retryable drop).
message DrainRequest {}

// Messages sent by a worker to the server over the bidirectional stream.
// RegisterWorker MUST be the first frame; the server answers it with
// RegisterAck as the first frame on the response stream before any other
// server-to-worker message.
message WorkerToServer {
  oneof message {
    RegisterWorker register = 1;
    ActivityResult result = 2;
    Heartbeat heartbeat = 3;
  }
}

// Messages sent by the server to a worker over the bidirectional stream.
message ServerToWorker {
  oneof message {
    ActivityTask task = 1;
    DrainRequest drain = 2;
    RegisterAck register_ack = 3;
    ResultAck result_ack = 4;
  }
}

// Positive registration acknowledgement. Always the first frame on the
// response stream. There is no negative counterpart: a denied or invalid
// registration fails the RPC with a gRPC error status exactly as before
// (PermissionDenied = ungranted namespace, Unauthenticated = rejected
// credentials, InvalidArgument = malformed first frame).
message RegisterAck {
  // Server-assigned stream identifier for this registration. Stable for the
  // life of the stream; used in server logs ("worker_id=3 lost") so workers
  // can correlate their own logs with the server's.
  uint64 worker_id = 1;
  // The namespace the registration was authorized against (echo of the
  // resolved scope, which authorization may have derived rather than copied).
  string namespace = 2;
  // The operator-configured liveness window on THIS server: a worker whose
  // in-flight activity goes longer than this without a heartbeat will be
  // declared lost. Lets SDKs surface "heartbeat at least this often" to
  // activity authors instead of guessing.
  uint64 heartbeat_window_ms = 3;
}

// Per-result acknowledgement: the server has consumed the identified
// ActivityResult frame and the worker may stop re-reporting it. Sent for
// every well-formed result frame, including duplicates the engine could no
// longer apply (their obligation is equally discharged). NOT a durability
// receipt — the durable truth is the workflow's event history; an ack lost
// in transit merely costs one redundant re-report on the next session.
message ResultAck {
  WorkflowId workflow_id = 1;
  ActivityId activity_id = 2;
}

// Initial worker advertisement. A registration scopes this stream and worker to
// a SET of (namespace) correctness boundaries, one task_queue pool/flavour lane
// within each, and an optional node locality; server-side partitioning and
// authorization are handled by the server worker endpoint.
//
// The dimensions are disjoint. `namespaces` is the SET of correctness/isolation
// boundaries the worker is authorized for: a workflow's activities only ever
// reach workers whose set includes the workflow's namespace, so crossing it is a
// bug, never a tuning choice. `task_queue` is the pool/flavour selector *within*
// each namespace (norn / claude / cpu / gpu); a task_queue miss is a liveness
// issue, never a correctness one. `node` is an OPTIONAL locality affinity (a
// locality, not a process: many workers may share a node id) used to filter
// within a pool; absent means the worker is reachable for unpinned dispatches.
// `activity_type` (carried separately at registration) is NOT a routing
// dimension — it is matched inside a pool after the pool is selected.
message RegisterWorker {
  // Set of correctness/isolation boundaries this worker is authorized for. The
  // server indexes the worker under each, matching a workflow's activities only
  // against workers whose set includes the workflow's namespace.
  repeated string namespaces = 1;
  repeated string activity_types = 2;
  // Pool/flavour selector within each namespace. The worker-pool address is
  // (namespace, task_queue); the server normalizes an empty value to the
  // literal "default" pool.
  string task_queue = 3;
  // Optional locality affinity this worker advertises. A dispatch pinned to a
  // node reaches only workers whose node equals it (round-robin among them); an
  // empty value means the worker carries no locality and is reachable only for
  // unpinned dispatches' general pool. Default = the worker's machine hostname.
  string node = 4;
}

// Activity invocation pushed by the server to a registered worker.
message ActivityTask {
  WorkflowId workflow_id = 1;
  ActivityId activity_id = 2;
  string activity_type = 3;
  Payload input = 4;
  // One-based delivery attempt stamped by the dispatching engine seam.
  // Zero is malformed: consumers MUST reject a task whose attempt is 0
  // (proto3 default = the producer failed to stamp it).
  uint32 attempt = 5;
  // Human-meaningful display labels the workflow attached to the activity
  // (for example brief=IP-001, repo=ablative-io/yggdrasil). Display metadata
  // only: the engine never interprets them and they never affect routing or
  // replay. Carried purely so worker logs and the dashboard can show what a
  // dispatch is working on. Absent (empty map) when the workflow set none.
  map<string, string> labels = 6;
  optional RunId run_id = 7;
}

// Activity completion or failure reported by a worker.
message ActivityResult {
  WorkflowId workflow_id = 1;
  ActivityId activity_id = 2;
  oneof outcome {
    Payload result = 3;
    ActivityError error = 4;
  }
  optional RunId run_id = 5;
}

// Explicit retryability classification for an activity failure.
enum ActivityErrorKind {
  ACTIVITY_ERROR_KIND_UNSPECIFIED = 0;
  ACTIVITY_ERROR_KIND_RETRYABLE = 1;
  ACTIVITY_ERROR_KIND_TERMINAL = 2;
}

// Failure shape mirroring aion-core ActivityError without inferring retryability
// from the message string.
message ActivityError {
  ActivityErrorKind kind = 1;
  string message = 2;
  optional Payload details = 3;
}

// Worker liveness for an in-flight activity. Progress is opaque and optional.
message Heartbeat {
  WorkflowId workflow_id = 1;
  ActivityId activity_id = 2;
  optional Payload progress = 3;
}
