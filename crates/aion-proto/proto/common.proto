syntax = "proto3";

package aion;

// UUID-backed logical workflow identifier.
message WorkflowId {
  string uuid = 1;
}

// UUID-backed concrete workflow run identifier.
message RunId {
  string uuid = 1;
}

// UUID-backed schedule resource identifier.
message ScheduleId {
  string uuid = 1;
}

// Sequence-position-backed activity identifier.
message ActivityId {
  uint64 sequence_position = 1;
}

// Timer identifier assigned either by workflow code or by the engine.
message TimerId {
  oneof kind {
    string name = 1;
    uint64 sequence_position = 2;
  }
}

// Opaque serialized payload with an explicit content-type tag.
message Payload {
  string content_type = 1;
  bytes bytes = 2;
}

// Transport representation for aion-core WorkflowStatus.
enum WorkflowStatus {
  WORKFLOW_STATUS_UNSPECIFIED = 0;
  WORKFLOW_STATUS_RUNNING = 1;
  WORKFLOW_STATUS_COMPLETED = 2;
  WORKFLOW_STATUS_FAILED = 3;
  WORKFLOW_STATUS_CANCELLED = 4;
  WORKFLOW_STATUS_TIMED_OUT = 5;
  WORKFLOW_STATUS_CONTINUED_AS_NEW = 6;
}

// Thin envelope for serde-encoded aion-core values such as Event,
// WorkflowFilter, and WorkflowSummary. The payload is the core type's own
// JSON representation; no field-by-field wire clone is introduced.
message WireEnvelope {
  string namespace = 1;
  optional string request_id = 2;
  Payload payload = 3;
}

// Stable client-branchable wire error codes. Messages are informational only.
enum WireErrorCode {
  WIRE_ERROR_CODE_UNSPECIFIED = 0;
  WIRE_ERROR_CODE_NOT_FOUND = 1;
  WIRE_ERROR_CODE_NAMESPACE_DENIED = 2;
  WIRE_ERROR_CODE_SEQUENCE_CONFLICT = 3;
  WIRE_ERROR_CODE_UNKNOWN_QUERY = 4;
  WIRE_ERROR_CODE_QUERY_TIMEOUT = 5;
  WIRE_ERROR_CODE_NOT_RUNNING = 6;
  WIRE_ERROR_CODE_LAGGED = 7;
  WIRE_ERROR_CODE_INVALID_INPUT = 8;
  WIRE_ERROR_CODE_BACKEND = 9;
}

// Wire-safe error value returned by server, client, and worker APIs.
message WireError {
  WireErrorCode code = 1;
  string message = 2;
  optional string error_type = 3;
}
