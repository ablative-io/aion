[package]
name = "dev-pipeline-worker-norn"
version = "0.1.0"
edition = "2024"
publish = false
description = "Standalone mixed activity worker serving the dev-pipeline activities: the brief-forge agent rounds (scout/design/refute) through the norn DRIVEN-mode harness (live transcripts + interventions), and implement-and-gate's provision_workspace/implement/run_gate/implement_resume/teardown_workspace by shelling to norn, git, and the gate commands."

# Deliberately NOT a workspace member (stacked-dev convention): this is the
# worker a deployment would write against the SDK.
[workspace]

# Out-of-workspace crates cannot inherit the repo's `[workspace.lints]`, so
# the same strict set is pinned here verbatim — this crate is held to the
# identical clippy/rustc bar as every workspace member.
[lints.rust]
unsafe_code = "deny"
missing_docs = "warn"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
todo = "warn"

[dependencies]
# Path dependency on the in-repo SDK, NOT crates.io 0.6.0: the published
# version predates the namespace/task_queue wire split and sends task_queue
# in the wire field the old protocol named `namespace` — against a
# current-main server that silently registers the worker into the WRONG
# namespace (invisible when both axes are "default", an instant wedge with
# distinct values). Switch back to the registry once a post-split SDK ships.
aion-worker = { path = "../../../crates/aion-worker", features = ["liminal-transport"] }
# The composition root's concrete driven-mode adapter + the neutral
# integration contract it is erased through — the same pair norn-fan-worker
# and agent-dev compose.
aion-integration-norn = { path = "../../../crates/aion-integration-norn" }
aion-integrations = { path = "../../../crates/aion-integrations" }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
