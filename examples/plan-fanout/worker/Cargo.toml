# Rust activity worker for the plan-fanout workflow.
#
# Standalone (NOT a workspace member) so it builds from a plain `cargo build` in
# this directory without pulling the whole aion workspace, mirroring the
# `incident-triage`, `norn-fan-worker`, and `agent-dev` example workers.
#
# It serves six activity types on the `plan-fanout` task queue: three AGENT
# activities (`plan`/`dev`/`review`) routed through the composed role-dispatching
# Norn harness in driven mode, and three CODE activities
# (`validate_plan`/`tally`/`integrate`) served by the plain typed registry whose
# logic is unit-tested in `logic.rs`.
[package]
name = "plan-fanout-worker"
version = "0.1.0"
edition = "2024"
publish = false
description = "Rust activity worker serving plan-fanout's agent (plan/dev/review) and code (validate_plan/tally/integrate) activities."

[[bin]]
name = "plan-fanout-worker"
path = "src/main.rs"

[workspace]

[dependencies]
# The `liminal-transport` feature enables the server-push serve path
# (`serve_with_redial`) the driven agent-harness wiring runs on.
aion-worker = { path = "../../../crates/aion-worker", features = ["liminal-transport"] }
# The composition root's concrete adapter + the neutral integration contract it
# is erased through.
aion-integration-norn = { path = "../../../crates/aion-integration-norn" }
aion-integrations = { path = "../../../crates/aion-integrations" }
# The neutral run-identity + payload types the custom harness reads.
aion-core = { path = "../../../crates/aion-core" }
anyhow = "1"
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
