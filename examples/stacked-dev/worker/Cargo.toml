[package]
name = "stacked-dev-worker"
version = "0.1.0"
edition = "2024"
publish = false
description = "Standalone activity worker serving the stacked-dev workflow family's eight activities."

# Deliberately NOT a workspace member: this is the worker a deployment would
# write against the published SDK, so it consumes `aion-worker` from
# crates.io exactly like the saga template's worker does.
[workspace]

[dependencies]
aion-worker = "0.5.0"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[dev-dependencies]
tempfile = "3"
