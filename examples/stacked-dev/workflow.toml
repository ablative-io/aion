# Workflow packaging descriptor consumed by `aion package`.
# Reference: docs/packaging.md.
#
# Three entries — the stacked-dev family (open question Q6): the `stacked_dev`
# parent plus the `brief_dev` and `gate` children, each independently
# dispatchable. A spawned child's workflow type is resolved by entry module
# name against the engine's loaded packages, so all three archives must be
# deployed together for full parent-child runs. All archives share the same
# beam set and content hash; only the entry module differs.
#
# Timeouts size the longest legitimate run: the parent waits on human-scale
# review verdicts (seven days), the brief-dev child iterates agent rounds for
# up to a day, and the gate is one full check sweep (six hours).

[[workflow]]
entry_module = "stacked_dev"
entry_function = "run"
timeout_seconds = 604800
input_schema = "schemas/input.json"
output_schema = "schemas/output.json"
activities = ["provision_workspace", "dev_resume", "request_review", "enrich_brief", "land"]
output = "stacked-dev.aion"

[[workflow]]
entry_module = "brief_dev"
entry_function = "run"
timeout_seconds = 86400
input_schema = "schemas/brief_dev_input.json"
output_schema = "schemas/brief_dev_output.json"
activities = ["scout", "warm_build", "dev", "scoped_checks", "dev_resume", "dev_review"]
output = "brief-dev.aion"

[[workflow]]
entry_module = "gate"
entry_function = "run"
timeout_seconds = 21600
input_schema = "schemas/gate_input.json"
output_schema = "schemas/gate_output.json"
activities = ["full_checks"]
output = "gate.aion"
