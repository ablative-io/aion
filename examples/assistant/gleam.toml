name = "assistant"
version = "0.1.0"
target = "erlang"
description = "Aion authoring assistant: a norn-harnessed operator chat session that answers aion authoring questions and authors workflow packages from the real repo, one bounded round at a time."
licences = ["MIT"]

[dependencies]
aion_flow = { path = "../../gleam/aion_flow" }
gleam_stdlib = ">= 0.34.0 and < 2.0.0"
gleam_json = ">= 2.0.0 and < 4.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
