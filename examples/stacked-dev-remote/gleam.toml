name = "aion_stacked_dev_remote"
version = "0.1.0"
target = "erlang"
description = "Remote clone-and-PR variant of the stacked-dev workflow. Clones from a URL, creates a branch, runs the full scout/dev/verify/review pipeline, pushes and creates a PR."
licences = ["MIT"]

[dependencies]
aion_flow = { path = "../../gleam/aion_flow" }
gleam_stdlib = ">= 0.34.0 and < 2.0.0"
gleam_json = ">= 2.0.0 and < 4.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
