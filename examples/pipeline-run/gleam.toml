name = "aion_pipeline_run"
version = "0.1.0"
target = "erlang"
description = "The stacked-diffs development pipeline as an Aion workflow: a prospekt dev-cycle brief drives scout -> plan-the-stack -> dependency-ordered per-unit dev/review/gate loops -> land -> notify, every agent step a driven Norn agent constrained by an output schema."
licences = ["MIT"]

[dependencies]
aion_flow = { path = "../../gleam/aion_flow" }
gleam_stdlib = ">= 0.34.0 and < 2.0.0"
gleam_json = ">= 2.0.0 and < 4.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
