# Workflow packaging descriptor consumed by `aion package`.
# Reference: docs/packaging.md.
#
# ONE entry — the awl_hello workflow. The entry module is the GENERATED
# module the AWL emitter writes to src/awl_hello.gleam from awl_hello.awl
# (rev-2 surface); it is committed so packaging works without running the
# toolchain, and regenerated — never hand-edited — after any .awl change.

[[workflow]]
entry_module = "awl_hello"
entry_function = "run"
timeout_seconds = 60
input_schema = "schemas/input.json"
output_schema = "schemas/output.json"
activities = ["greet", "shout"]
output = "awl-hello.aion"
