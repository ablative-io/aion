# Workflow packaging descriptor consumed by `aion-cli package`.
# Reference: docs/packaging.md.
#
# Two entries: the order-fulfillment parent saga and the shipping child
# workflow. A spawned child's workflow type is resolved by entry module name
# against the engine's loaded packages, so the child needs its own archive
# loaded alongside the parent's. Both archives share the same beam set and
# content hash; only the entry module differs.

[[workflow]]
entry_module = "order_fulfillment"
entry_function = "run"
timeout_seconds = 3600
input_schema = "schemas/input.json"
output_schema = "schemas/output.json"
activities = ["charge_payment", "refund_payment"]
output = "order-fulfillment.aion"

[[workflow]]
entry_module = "order_shipping"
entry_function = "run"
timeout_seconds = 600
input_schema = "schemas/shipping_input.json"
output_schema = "schemas/shipping_output.json"
activities = ["ship_order"]
output = "order-shipping.aion"
