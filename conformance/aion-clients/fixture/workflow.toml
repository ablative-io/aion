# Workflow packaging descriptor consumed by `aion-cli package`.
#
# Builds the two fixture archives the live client-conformance scenarios in
# ../scenarios.json require: `conformance_echo` (fixtures.workflowType) and
# `conformance_slow_query` (fixtures.slowQueryWorkflowType). Build with:
#
#   cargo run -p aion-cli -- package conformance/aion-clients/fixture --build

[[workflow]]
entry_module = "conformance_echo"
entry_function = "run"
timeout_seconds = 3600
input_schema = "schemas/input.json"
output_schema = "schemas/output.json"
activities = []
output = "conformance_echo.aion"

[[workflow]]
entry_module = "conformance_slow_query"
entry_function = "run"
timeout_seconds = 3600
input_schema = "schemas/input.json"
output_schema = "schemas/output.json"
activities = []
output = "conformance_slow_query.aion"
